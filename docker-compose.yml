services:
  postgres:
    image: postgres:16-alpine
    container_name: niva-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: niva_db
      POSTGRES_USER: niva
      POSTGRES_PASSWORD: niva_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  pgdata:
